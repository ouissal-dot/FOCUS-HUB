<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="photos/focushub.png">
    <link rel="stylesheet" href="Weather.css">
    <title>Weather app </title>
</head>
<body>
    <div class="card">
    
    <div class="search-bar">
      <input type="text" value="germany" placeholder="Search city..." />
      <img src="photos/search.png" >
    </div>
 
    
    <div class="weather-icon">⛅🌧️</div>
 
    
    <div class="temp">29°c</div>
    <div class="city">germany</div>
 
    
    <div class="details">
      <div class="detail-item">
        
<img src="photos/Humidity.png" >
        <div>
          
          <div class="detail-value">61%</div>
          <div class="detail-label">Humidity</div>
          
        </div>
      </div>
 
      <div class="detail-item">
        
 <img src="photos/Wind.jpg" >
        <div>
          
          <div class="detail-value">2.57 km/h</div>
          <div class="detail-label">Wind Speed</div>
          
        </div>
      </div>
    </div>
  </div>


<footer>




  <a href="index.html">
            <img src="photos/home icon.png">
</a>
</footer>

   
<script src="focus.js"></script>








    
</body>
</html>
