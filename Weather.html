<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="photos/focushub.png">
    <link rel="stylesheet" href="Weather.css">
    <title>Weather app </title>
</head>
<body>
    <div class="card">
    
    <div class="search-bar">
      <input type="text" value="delhi" placeholder="Search city..." />
      <img src="" alt="">
    </div>
 
    
    <div class="weather-icon">⛅🌧️</div>
 
    <!-- Temp -->
    <div class="temp">29°c</div>
    <div class="city">Delhi</div>
 
    <!-- Details -->
    <div class="details">
      <div class="detail-item">
        <!-- Humidity waves icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <path d="M3 8c2 0 2 2 4 2s2-2 4-2 2 2 4 2 2-2 4-2"/>
          <path d="M3 13c2 0 2 2 4 2s2-2 4-2 2 2 4 2 2-2 4-2"/>
        </svg>
        <div>
          <div class="detail-value">61%</div>
          <div class="detail-label">Humidity</div>
        </div>
      </div>
 
      <div class="detail-item">
        <!-- Wind icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <path d="M9 2C9 2 9 7 14 7H3"/>
          <path d="M9 12H3"/>
          <path d="M11 17H3"/>
          <path d="M11 17c0 0 0 5 5 5"/>
        </svg>
        <div>
          <div class="detail-value">2.57 km/h</div>
          <div class="detail-label">Wind Speed</div>
        </div>
      </div>
    </div>
  </div>



<a href="index.html">
            <img src="photos/home icon.png">
</a>
   
<script src="focus.js"></script>








    
</body>
</html>
