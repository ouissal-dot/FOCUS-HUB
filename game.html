<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="photos/focushub.png">
    <link rel="stylesheet" href="game.css">
    <title>Tic Tac Toe </title>
</head>
<body>



<div class="box">
    <h1>Tic Tac Toe Game</h1>

    <div class="container" id="container">
        <div  class="carre"  cellIndex="0"></div>
        <div  class="carre"  cellIndex="1"></div>
        <div  class="carre"  cellIndex="2"></div>
        <div  class="carre"  cellIndex="3"></div>
        <div  class="carre"  cellIndex="4"></div>
        <div  class="carre"  cellIndex="5"></div>
        <div  class="carre"  cellIndex="6"></div>
        <div  class="carre"  cellIndex="7"></div>
        <div  class="carre"  cellIndex="8"></div>
    </div>

    <h2 class="status"></h2>
    <button class="reset" onclick="resetPlay()">Restart Game</button>



</div>
<a href="index.html">
            <img src="photos/home icon.png">
</a>
   
<script src="focus.js"></script>
</body>
</html>
